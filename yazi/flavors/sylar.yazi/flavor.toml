[theme]
# Här definierar du temats färger
background = "#282a36"
foreground = "#f8f8f2"

# Lägg till fler färger och stilar efter behov
color1 = "#ff5555"  # red
color2 = "#50fa7b"  # green
color3 = "#f1fa8c"  # yellow
color4 = "#ff79c6"  # pink
color5 = "#8be9fd"  # cyan
color6 = "#bd93f9"  # purple
color7 = "#e4e4e4"  # white
color8 = "#21222c"  # black

# Om det finns andra konfigurationer, lägg till dem här
